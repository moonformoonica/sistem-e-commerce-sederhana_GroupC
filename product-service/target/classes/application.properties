server.port=${PORT:3001}

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-db}:${DB_PORT:3306}/${DB_NAME:product_service}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:product_user}
spring.datasource.password=${DB_PASSWORD:product_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
